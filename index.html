<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>財務儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDWr4lUqAsU_Fij-hnjEHryC3bsf2rMk2I",
  authDomain: "money-873d5.firebaseapp.com",
  projectId: "money-873d5",
  storageBucket: "money-873d5.firebasestorage.app",
  messagingSenderId: "376312716194",
  appId: "1:376312716194:web:3e1c0dd674a8be2abfb0fb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

window._fbSave = async function(stateObj) {
  if(!currentUser) return;
  try { await setDoc(doc(db, 'users', currentUser.uid), JSON.parse(JSON.stringify(stateObj))); }
  catch(e) { console.warn('雲端儲存失敗', e); }
};

window._fbLoad = async function() {
  if(!currentUser) return null;
  try {
    const snap = await getDoc(doc(db, 'users', currentUser.uid));
    return snap.exists() ? snap.data() : null;
  } catch(e) { console.warn('雲端讀取失敗', e); return null; }
};

window._fbSignIn = async function() {
  try { await signInWithPopup(auth, provider); }
  catch(e) { alert('登入失敗：' + e.message); }
};

window._fbSignOut = async function() {
  if(!confirm('確定登出？')) return;
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if(user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
    document.getElementById('userAvatar').src = user.photoURL || '';
    document.getElementById('userName').textContent = user.displayName || user.email;

    const cloud = await window._fbLoad();
    if(cloud) {
      if(cloud.accounts) state.accounts = cloud.accounts;
      if(cloud.investments) state.investments = cloud.investments;
      if(cloud.categories) state.categories = cloud.categories;
      if(cloud.journal) state.journal = cloud.journal;
      if(cloud.history) state.history = cloud.history;
    } else {
      window._fbSave(state);
    }
    renderAll();
    fetchETHPrice();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appContent').style.display = 'none';
  }
});
</script>

<style>
:root {
  --bg:#0d0f14; --surface:#161a24; --surface2:#1e2333; --border:#2a3045;
  --green:#00e5a0; --red:#ff4d6d; --yellow:#f5c842; --blue:#4d9fff;
  --text:#e8ecf5; --muted:#7a8299; --accent:#00e5a0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding:20px;}
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:1fr 1fr 1fr;}
@media(max-width:700px){.grid-2,.grid-3{grid-template-columns:1fr;}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;}
.card-title{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-family:'Space Mono',monospace;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.section-header .card-title{margin-bottom:0;}

/* Hero */
.hero{text-align:center;padding:28px 20px;background:linear-gradient(135deg,#161a24 0%,#1a2035 100%);border:1px solid var(--border);border-radius:20px;margin-bottom:16px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-60px;left:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(0,229,160,0.08) 0%,transparent 70%);pointer-events:none;}
.hero-label{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
.hero-value{font-family:'Space Mono',monospace;font-size:40px;font-weight:700;color:var(--green);line-height:1;margin-bottom:4px;}
.stat-row{display:flex;justify-content:space-around;margin-top:18px;padding-top:18px;border-top:1px solid var(--border);}
.stat-item{text-align:center;}
.stat-num{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;}

/* Tabs */
.tab-bar{display:flex;gap:4px;margin-bottom:20px;background:var(--surface2);border-radius:12px;padding:4px;}
.tab-btn{flex:1;padding:8px 12px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:var(--muted);background:none;transition:all 0.2s;}
.tab-btn.active{background:var(--surface);color:var(--text);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* Buttons */
.edit-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans TC',sans-serif;}
.edit-btn:hover{border-color:var(--accent);color:var(--accent);}
.add-btn{width:100%;padding:11px;background:rgba(0,229,160,0.08);border:1px dashed rgba(0,229,160,0.3);border-radius:12px;color:var(--green);font-size:13px;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans TC',sans-serif;margin-top:12px;}
.add-btn:hover{background:rgba(0,229,160,0.15);}
.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:opacity 0.2s;}
.btn:hover{opacity:0.85;}
.btn-primary{background:var(--green);color:#000;font-weight:700;}
.btn-cancel{background:var(--border);color:var(--muted);}
.btn-danger{background:var(--red);color:#fff;font-weight:700;}

/* Account / list items */
.list-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.list-item:last-child{border-bottom:none;}
.item-name{font-size:14px;}
.item-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.item-val{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--green);}

/* Bar */
.expense-item{margin-bottom:13px;}
.expense-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.bar-track{height:4px;background:var(--border);border-radius:4px;}
.bar-fill{height:4px;border-radius:4px;transition:width 0.4s ease;}

/* Investment card */
.invest-card{background:var(--surface2);border-radius:12px;padding:15px;margin-bottom:12px;}
.invest-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.invest-name{font-size:15px;font-weight:700;}
.invest-ticker{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}
.invest-badge{font-size:12px;font-family:'Space Mono',monospace;padding:3px 8px;border-radius:6px;font-weight:700;}
.badge-up{background:rgba(0,229,160,0.15);color:var(--green);}
.badge-down{background:rgba(255,77,109,0.15);color:var(--red);}
.invest-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.invest-stat-l{font-size:11px;color:var(--muted);}
.invest-stat-v{font-size:13px;font-family:'Space Mono',monospace;margin-top:2px;}

/* Journal */
.journal-entry{padding:12px 0;border-bottom:1px solid var(--border);}
.journal-entry:last-child{border-bottom:none;}
.je-top{display:flex;justify-content:space-between;align-items:flex-start;}
.je-left{flex:1;}
.je-date{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}
.je-desc{font-size:14px;margin-top:2px;}
.je-cat{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;margin-top:4px;font-family:'Space Mono',monospace;}
.je-account{font-size:11px;color:var(--muted);margin-top:3px;}
.je-amount{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;white-space:nowrap;margin-left:12px;}
.je-actions{display:flex;gap:6px;margin-left:8px;align-items:center;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px;width:92%;max-width:460px;max-height:88vh;overflow-y:auto;}
.modal h2{font-size:16px;margin-bottom:18px;color:var(--accent);}
.form-group{margin-bottom:13px;}
.form-group label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;}
.form-group input,.form-group select{width:100%;padding:10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Space Mono',monospace;font-size:14px;outline:none;transition:border-color 0.2s;}
.form-group input:focus,.form-group select:focus{border-color:var(--accent);}
.form-group select option{background:var(--surface2);}
.modal-btns{display:flex;gap:10px;margin-top:18px;}
.radio-row{display:flex;gap:8px;margin-bottom:4px;}
.radio-btn{flex:1;padding:9px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;text-align:center;}
.radio-btn.selected{border-color:var(--accent);color:var(--accent);background:rgba(0,229,160,0.08);}
.radio-btn.sel-red.selected{border-color:var(--red);color:var(--red);background:rgba(255,77,109,0.08);}

/* Month tag */
.month-tag{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);padding:3px 8px;border:1px solid var(--border);border-radius:6px;}

/* Colors */
.green{color:var(--green);}
.red{color:var(--red);}
.yellow{color:var(--yellow);}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#000;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;padding:10px 18px;border-radius:10px;box-shadow:0 4px 20px rgba(0,229,160,0.3);opacity:0;transition:opacity 0.3s;z-index:9999;pointer-events:none;}

/* History */
.hist-item{padding:12px 0;border-bottom:1px solid var(--border);}
.hist-item:last-child{border-bottom:none;}
.hist-detail{display:none;margin-top:10px;background:var(--surface2);border-radius:10px;padding:12px;}
</style>
</head>
<body>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">編輯</h2>
    <div id="modalFields"></div>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modalConfirmBtn" onclick="saveModal()">儲存</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<!-- Login Screen -->
<div id="loginScreen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:20px;">
  <div style="text-align:center;">
    <div style="font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);letter-spacing:3px;margin-bottom:8px;">📊 財務儀表板</div>
    <div style="font-size:28px;font-weight:700;color:var(--green);margin-bottom:6px;">歡迎回來</div>
    <div style="font-size:13px;color:var(--muted);">登入以同步你的財務資料</div>
  </div>
  <button onclick="window._fbSignIn()" style="display:flex;align-items:center;gap:10px;padding:12px 24px;background:white;border:none;border-radius:12px;font-size:15px;font-family:'Noto Sans TC',sans-serif;font-weight:700;color:#333;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.3);">
    <img src="https://www.google.com/favicon.ico" width="20" height="20"> 使用 Google 帳號登入
  </button>
</div>

<!-- App Content -->
<div id="appContent" style="display:none;">
<div style="max-width:960px;margin:0 auto;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;">
    <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:200px;">
      <span style="font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);letter-spacing:2px;">📊 財務儀表板</span>
      <span class="month-tag" id="currentDate"></span>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="edit-btn" onclick="importData()" style="font-size:12px;padding:6px 13px;">⬆ 匯入</button>
      <button class="edit-btn" onclick="exportData()" style="font-size:12px;padding:6px 13px;border-color:rgba(0,229,160,0.4);color:var(--green);">⬇ 匯出</button>
      <div style="display:flex;align-items:center;gap:8px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;">
        <img id="userAvatar" src="" width="22" height="22" style="border-radius:50%;object-fit:cover;">
        <span id="userName" style="font-size:12px;color:var(--muted);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
        <button onclick="window._fbSignOut()" style="background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;padding:0;font-family:'Noto Sans TC',sans-serif;">登出</button>
      </div>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-label">淨資產</div>
    <div class="hero-value" id="heroNetworth">$0</div>
    <div class="stat-row">
      <div class="stat-item"><div class="stat-num green" id="heroAssets">$0</div><div class="stat-lbl">總資產</div></div>
      <div class="stat-item"><div class="stat-num" id="heroLiabilities" style="color:var(--muted);">$0</div><div class="stat-lbl">負債</div></div>
      <div class="stat-item"><div class="stat-num green" id="heroRealInc">$0</div><div class="stat-lbl">本月收入</div></div>
      <div class="stat-item"><div class="stat-num red" id="heroRealExp">$0</div><div class="stat-lbl">本月支出</div></div>
      <div class="stat-item"><div class="stat-num" id="heroFlow">$0</div><div class="stat-lbl">本月結餘</div></div>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('journal')">📒 日記帳</button>
    <button class="tab-btn" onclick="switchTab('summary')">📊 本月摘要</button>
    <button class="tab-btn" onclick="switchTab('assets')">🏦 資產管理</button>
    <button class="tab-btn" onclick="switchTab('history')">📦 歷史存檔</button>
  </div>

  <!-- ===== TAB: 日記帳 ===== -->
  <div class="tab-panel active" id="tab-journal">
    <div class="card">
      <div class="section-header">
        <div class="card-title">交易紀錄</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary" style="flex:none;padding:7px 18px;font-size:13px;" onclick="openJournalModal()">＋ 新增交易</button>
          <button class="btn" style="flex:none;padding:7px 18px;font-size:13px;background:rgba(77,159,255,0.15);border:1px solid rgba(77,159,255,0.4);color:var(--blue);" onclick="openTransferModal()">⇄ 轉帳</button>
        </div>
      </div>

      <!-- Date filter -->
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        <button class="edit-btn" id="filter-all" onclick="setFilter('all')" style="border-color:var(--accent);color:var(--accent);">全部</button>
        <button class="edit-btn" id="filter-expense" onclick="setFilter('expense')">支出</button>
        <button class="edit-btn" id="filter-income" onclick="setFilter('income')">收入</button>
        <button class="edit-btn" id="filter-transfer" onclick="setFilter('transfer')">轉帳</button>
        <input type="month" id="filterMonth" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 10px;font-size:12px;font-family:'Space Mono',monospace;outline:none;" onchange="renderJournal()">
      </div>

      <div id="journalList"></div>
    </div>
  </div>

  <!-- ===== TAB: 本月摘要 ===== -->
  <div class="tab-panel" id="tab-summary">
    <div class="grid grid-2" style="margin-bottom:16px;">
      <div class="card">
        <div class="section-header">
          <div class="card-title">本月收入</div>
          <div id="realIncTotal" style="font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--green);"></div>
        </div>
        <div id="realIncList"></div>
      </div>
      <div class="card">
        <div class="section-header">
          <div class="card-title">本月支出</div>
          <div id="realExpTotal" style="font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--red);"></div>
        </div>
        <div id="realExpList"></div>
      </div>
    </div>
    <div class="card">
      <div class="section-header">
        <div class="card-title">月度預算對照</div>
      </div>
      <div id="budgetList"></div>
    </div>
  </div>

  <!-- ===== TAB: 資產管理 ===== -->
  <div class="tab-panel" id="tab-assets">
    <div class="grid grid-2" style="margin-bottom:16px;">
      <div class="card">
        <div class="section-header">
          <div class="card-title">帳戶清單</div>
          <button class="edit-btn" onclick="openAccountModal()">＋ 新增</button>
        </div>
        <div id="accountsList"></div>
      </div>
      <div class="card">
        <div class="section-header">
          <div class="card-title">投資組合</div>
          <div style="display:flex;gap:6px;align-items:center;">
            <button class="edit-btn" id="ethRefreshBtn" onclick="fetchETHPrice()" style="color:var(--yellow);border-color:rgba(245,200,66,0.4);" title="更新 ETH 即時價格">↻ ETH</button>
            <button class="edit-btn" onclick="addInvestItem()">＋ 新增</button>
          </div>
        </div>
        <div id="investList"></div>
      </div>
    </div>
    <div class="card">
      <div class="section-header">
        <div class="card-title">月度預算設定</div>
        <button class="edit-btn" onclick="openBudgetCatModal()">＋ 新增類別</button>
      </div>
      <div id="budgetSettingList"></div>
    </div>
  </div>

  <!-- ===== TAB: 歷史存檔 ===== -->
  <div class="tab-panel" id="tab-history">
    <div class="card">
      <div class="section-header">
        <div class="card-title">歷史收支存檔</div>
        <button class="edit-btn" onclick="archiveMonth()" style="color:var(--yellow);border-color:rgba(245,200,66,0.4);">⌛ 月底結算</button>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

</div>

<script>
// ================================================================
// STATE
// ================================================================
let state = {
  accounts: [
    { id:'acc1', name:'現金', sub:'TWD', value:916 },
    { id:'acc2', name:'新光銀行', sub:'TWD', value:18893 },
    { id:'acc3', name:'郵局', sub:'TWD', value:844 },
    { id:'acc4', name:'不好動', sub:'TWD (口袋現金)', value:4843 },
  ],
  investments: [
    { name:'富邦台50', ticker:'006208', shares:5, costPrice:172.00, currentPrice:174.45, breakeven:176.18, type:'etf' },
    { name:'以太幣', ticker:'ETH', amount:0.0222777, costTWD:1487, currentTWD:1428, avgPrice:66745, type:'crypto' }
  ],
  // 支出類別（含預算）
  categories: [
    { id:'cat1', name:'飲食', color:'#ff6b6b', budget:7500, type:'expense' },
    { id:'cat2', name:'虛擬', color:'#f5c842', budget:1000, type:'expense' },
    { id:'cat3', name:'醫療', color:'#ff9f43', budget:1300, type:'expense' },
    { id:'cat4', name:'定期定額', color:'#26de81', budget:2000, type:'expense' },
    { id:'cat5', name:'機車', color:'#45aaf2', budget:2000, type:'expense' },
    { id:'cat6', name:'日用品', color:'#fd79a8', budget:1000, type:'expense' },
    { id:'cat7', name:'撲克麻將', color:'#a29bfe', budget:500, type:'expense' },
    { id:'cat8', name:'交通', color:'#74b9ff', budget:600, type:'expense' },
    // 收入類別
    { id:'cat9', name:'外送收入', color:'#00e5a0', budget:0, type:'income' },
    { id:'cat10', name:'家裡支援', color:'#7bed9f', budget:0, type:'income' },
    { id:'cat11', name:'其他收入', color:'#55efc4', budget:0, type:'income' },
  ],
  // 日記帳交易紀錄
  journal: [],
  // 月底結算歷史
  history: [],
};

// ================================================================
// UTILS
// ================================================================
const STORAGE_KEY = 'finance_dashboard_v2';
let currentEditType = null;
let currentEditIndex = null;
let journalFilter = 'all';

function fmt(n){ return '$' + Math.round(Math.abs(n)).toLocaleString(); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.warn('localStorage 儲存失敗',e); }
  if(window._fbSave) window._fbSave(state).then(()=>showToast('已儲存 ✓')).catch(()=>showToast('已儲存（本機）✓'));
  else showToast('已儲存 ✓');
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const s = JSON.parse(raw);
      if(s.accounts) state.accounts = s.accounts;
      if(s.investments) state.investments = s.investments;
      if(s.categories) state.categories = s.categories;
      if(s.journal) state.journal = s.journal;
      if(s.history) state.history = s.history;
    }
  }catch(e){ console.warn('讀取失敗',e); }
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity='1';
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.style.opacity='0'; }, 2000);
}

// 取得某類別
function getCat(id){ return state.categories.find(c=>c.id===id); }
function getAcc(id){ return state.accounts.find(a=>a.id===id); }

// 計算本月交易（收入/支出）按類別加總
function getCurrentMonthKey(){
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
}
function getMonthJournal(monthKey){
  return state.journal.filter(j=> j.date && j.date.startsWith(monthKey));
}
function sumByCategory(entries, type){
  const map = {};
  entries.filter(e=>e.type===type).forEach(e=>{
    map[e.categoryId] = (map[e.categoryId]||0) + e.amount;
  });
  return map;
}

function renderAll(){
  renderHero();
  renderJournal();
  renderSummary();
  renderAccounts();
  renderInvestments();
  renderBudgetSettings();

}

function renderHero(){
  const acctTotal = state.accounts.reduce((s,a)=>s+a.value,0);
  const investTWD = state.investments.reduce((s,i)=>{
    if(i.type==='etf') return s + i.shares * i.currentPrice;
    return s + i.currentTWD;
  },0);
  const total = acctTotal + investTWD;

  const mk = getCurrentMonthKey();
  const entries = getMonthJournal(mk);
  const totalInc = entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const totalExp = entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const flow = totalInc - totalExp;

  document.getElementById('heroNetworth').textContent = fmt(total);
  document.getElementById('heroAssets').textContent = fmt(total);
  document.getElementById('heroLiabilities').textContent = '$0';
  document.getElementById('heroRealInc').textContent = fmt(totalInc);
  document.getElementById('heroRealExp').textContent = fmt(totalExp);
  const fe = document.getElementById('heroFlow');
  fe.textContent = (flow>=0?'+':'-') + fmt(flow);
  fe.className = 'stat-num ' + (flow>=0?'green':'red');
}

  });
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

function setFilter(f){
  journalFilter = f;
  ['all','expense','income','transfer'].forEach(k=>{
    const el = document.getElementById('filter-'+k);
    if(el){ el.style.borderColor = k===f?'var(--accent)':''; el.style.color = k===f?'var(--accent)':''; }
  });
  renderJournal();
}

function renderJournal(){
  const el = document.getElementById('journalList');
  let entries = [...state.journal].sort((a,b)=> b.date.localeCompare(a.date));

  // month filter
  const mf = document.getElementById('filterMonth');
  if(mf && mf.value) entries = entries.filter(e=>e.date.startsWith(mf.value));

  // type filter
  if(journalFilter !== 'all') entries = entries.filter(e=>e.type===journalFilter);
  else entries = entries; // show all including transfers

  if(entries.length===0){
    el.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:20px;text-align:center;">尚無交易紀錄，點上方「＋ 新增交易」開始記帳</div>';
    return;
  }

  // group by date
  const groups = {};
  entries.forEach(e=>{ (groups[e.date]||(groups[e.date]=[])).push(e); });

  el.innerHTML = Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date=>{
    const dayEntries = groups[date];
    const dayInc = dayEntries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
    const dayExp = dayEntries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
    const dayTransfer = dayEntries.filter(e=>e.type==='transfer').reduce((s,e)=>s+e.amount,0);
    const [y,m,d] = date.split('-');
    const dateLabel = `${m}/${d}`;
    return `
      <div style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);">
          <span style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);">${dateLabel}</span>
          <span style="font-size:11px;color:var(--muted);">
            ${dayInc>0?`<span style="color:var(--green);">+${fmt(dayInc)}</span>`:''}
            ${dayExp>0?`<span style="color:var(--red);margin-left:6px;">-${fmt(dayExp)}</span>`:''}
            ${dayTransfer>0?`<span style="color:var(--blue);margin-left:6px;">⇄${fmt(dayTransfer)}</span>`:''}
          </span>
        </div>
        ${dayEntries.map(e=>{
          const cat = getCat(e.categoryId);
          const acc = getAcc(e.accountId);
          const isInc = e.type==='income';
          const isTransfer = e.type==='transfer';
          if(isTransfer){
            const fromAcc = getAcc(e.fromAccountId);
            const toAcc = getAcc(e.toAccountId);
            return `
            <div class="journal-entry">
              <div class="je-top">
                <div class="je-left">
                  <div class="je-desc" style="display:flex;align-items:center;gap:6px;">
                    <span style="color:var(--blue);">⇄</span>
                    <span>${fromAcc?.name||'?'}</span>
                    <span style="color:var(--muted);font-size:12px;">→</span>
                    <span>${toAcc?.name||'?'}</span>
                  </div>
                  <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
                    <span class="je-cat" style="background:rgba(77,159,255,0.15);color:var(--blue);">轉帳</span>
                    ${e.note?`<span style="font-size:11px;color:var(--muted);">📝 ${e.note}</span>`:''}
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                  <span class="je-amount" style="color:var(--blue);">${fmt(e.amount)}</span>
                  <div class="je-actions">
                    <button class="edit-btn" style="color:var(--red);border-color:rgba(255,77,109,0.3);" onclick="deleteTransferEntry('${e.id}')">刪除</button>
                  </div>
                </div>
              </div>
            </div>`;
          }
          return `
          <div class="journal-entry">
            <div class="je-top">
              <div class="je-left">
                <div class="je-desc">${e.desc||cat?.name||'—'}</div>
                <div style="display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;">
                  ${cat?`<span class="je-cat" style="background:${cat.color}22;color:${cat.color};">${cat.name}</span>`:''}
                  ${acc?`<span style="font-size:11px;color:var(--muted);">📁 ${acc.name}</span>`:''}
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="je-amount ${isInc?'green':'red'}">${isInc?'+':'-'}${fmt(e.amount)}</span>
                <div class="je-actions">
                  <button class="edit-btn" onclick="editJournalEntry('${e.id}')">編輯</button>
                  <button class="edit-btn" style="color:var(--red);border-color:rgba(255,77,109,0.3);" onclick="deleteJournalEntry('${e.id}')">刪除</button>

              </div>
            </div>
            ${e.note?`<div style="font-size:12px;color:var(--muted);margin-top:5px;padding-left:4px;">📝 ${e.note}</div>`:''}

  }).join('');

  const expCats = state.categories.filter(c=>c.type==='expense');
  const incCats = state.categories.filter(c=>c.type==='income');

  const today = new Date().toISOString().slice(0,10);

  return `
    <div class="radio-row" id="typeRow">
      <button class="radio-btn sel-red ${type==='expense'?'selected':''}" id="rb-expense" onclick="selectType('expense')">支出</button>
      <button class="radio-btn ${type==='income'?'selected':''}" id="rb-income" onclick="selectType('income')">收入</button>

    <div class="form-group" style="margin-top:12px;">
      <label>日期</label>
      <input type="date" id="f_date" value="${entry?.date||today}">
    </div>
    <div class="form-group">
      <label>金額 (TWD)</label>
      <input type="number" id="f_amount" value="${entry?.amount||''}" placeholder="0" min="0" autofocus>
    </div>
    <div class="form-group">
      <label>類別</label>
      <select id="f_cat">

          ${expCats.map(c=>`<option value="${c.id}" ${entry?.categoryId===c.id?'selected':''}>${c.name}</option>`).join('')}
        </optgroup>
        <optgroup label="── 收入 ──">

        </optgroup>
      </select>
    </div>
    <div class="form-group">
      <label>帳戶</label>
      <select id="f_acc">
        ${state.accounts.map(a=>`<option value="${a.id}" ${entry?.accountId===a.id?'selected':''}>${a.name}</option>`).join('')}
      </select>
    </div>`;
}

let _journalType = 'expense';
function selectType(t){
  _journalType = t;
  document.getElementById('rb-expense').classList.toggle('selected', t==='expense');
  document.getElementById('rb-income').classList.toggle('selected', t==='income');
}

function openJournalModal(entry){
  _journalType = entry?.type||'expense';
  currentEditType = entry ? 'journal_edit' : 'journal_new';
  currentEditIndex = entry?.id||null;
  openModal('新增交易', buildJournalFields(entry), entry?'儲存':'新增');
}

function editJournalEntry(id){
  const entry = state.journal.find(e=>e.id===id);
  if(entry) openJournalModal(entry);
}

function deleteJournalEntry(id){
  if(!confirm('確定刪除此筆交易？帳戶餘額將自動還原。')) return;
  const entry = state.journal.find(e=>e.id===id);
  if(entry){
    const acc = getAcc(entry.accountId);
    if(acc){
      if(entry.type==='expense') acc.value += entry.amount;
      else acc.value -= entry.amount;
    }
  }
  state.journal = state.journal.filter(e=>e.id!==id);
  saveState();
  renderAll();
  showToast('交易已刪除，帳戶餘額已還原');
}

function saveJournalEntry(){
  const amount = parseFloat(document.getElementById('f_amount').value)||0;
  const date = document.getElementById('f_date').value;
  const categoryId = document.getElementById('f_cat').value;
  const accountId = document.getElementById('f_acc').value;

  if(!amount || !date){ alert('請填寫日期和金額'); return; }

  const entry = {
    id: currentEditIndex || uid(),
    type: _journalType,
    date, amount, categoryId, accountId
  };

  const acc = getAcc(accountId);
  if(acc){
    if(currentEditType==='journal_edit'){
      // 先還原舊的帳戶餘額
      const old = state.journal.find(e=>e.id===currentEditIndex);
      if(old){
        const oldAcc = getAcc(old.accountId);
        if(oldAcc){
          if(old.type==='expense') oldAcc.value += old.amount;
          else oldAcc.value -= old.amount;
        }
      }
    }
    // 套用新的
    if(entry.type==='expense') acc.value -= amount;
    else acc.value += amount;
  }

  if(currentEditType==='journal_edit'){
    const idx = state.journal.findIndex(e=>e.id===currentEditIndex);
    if(idx>=0) state.journal[idx] = entry;
  } else {
    state.journal.push(entry);
  }

  saveState();
  closeModal();
  renderAll();
  showToast(entry.type==='expense'?`-${fmt(amount)} 已記錄`:`+${fmt(amount)} 已記錄`);
}

    </div>
    <div class="form-group">
      <label>從哪個帳戶轉出</label>
      <select id="f_from_acc">${accOptions}</select>
    </div>
    <div style="text-align:center;color:var(--blue);font-size:20px;margin:-4px 0 8px;">↓</div>
    <div class="form-group">
      <label>轉入哪個帳戶</label>
      <select id="f_to_acc">${accOptions}</select>
    </div>
    <div class="form-group">
      <label>金額 (TWD)</label>
      <input type="number" id="f_transfer_amount" placeholder="0" min="0">
    </div>
    <div class="form-group">
      <label>備註（選填）</label>
      <input type="text" id="f_transfer_note" placeholder="例：提領現金">
    </div>`, '確認轉帳');
}

function saveTransferEntry(){
  const date = document.getElementById('f_transfer_date').value;
  const fromId = document.getElementById('f_from_acc').value;
  const toId = document.getElementById('f_to_acc').value;
  const amount = parseFloat(document.getElementById('f_transfer_amount').value)||0;
  const note = document.getElementById('f_transfer_note').value.trim();

  if(!amount || !date){ alert('請填寫日期和金額'); return; }
  if(fromId === toId){ alert('來源與目標帳戶不能相同'); return; }

  const fromAcc = getAcc(fromId);
  const toAcc = getAcc(toId);

  if(!fromAcc || !toAcc){ alert('帳戶不存在'); return; }
  if(fromAcc.value < amount){
    if(!confirm(`來源帳戶餘額不足（現有 ${fmt(fromAcc.value)}），確定繼續？`)) return;
  }

  // 建立轉帳記錄
  const entry = {
    id: uid(),
    type: 'transfer',
    date,
    amount,
    fromAccountId: fromId,
    toAccountId: toId,
    note: note || ''
  };

  // 調整帳戶餘額
  fromAcc.value -= amount;
  toAcc.value += amount;

  state.journal.push(entry);
  saveState();
  closeModal();
  renderAll();
  showToast(`⇄ 轉帳 ${fmt(amount)} 完成`);
}

function deleteTransferEntry(id){
  if(!confirm('確定刪除此轉帳記錄？帳戶餘額將自動還原。')) return;
  const entry = state.journal.find(e=>e.id===id);
  if(entry && entry.type==='transfer'){
    const fromAcc = getAcc(entry.fromAccountId);
    const toAcc = getAcc(entry.toAccountId);
    if(fromAcc) fromAcc.value += entry.amount;
    if(toAcc) toAcc.value -= entry.amount;
  }
  state.journal = state.journal.filter(e=>e.id!==id);
  saveState();
  renderAll();
  showToast('轉帳已刪除，帳戶餘額已還原');
}


function renderSummary(){
  const mk = getCurrentMonthKey();
  const entries = getMonthJournal(mk);
  const incMap = sumByCategory(entries, 'income');
  const expMap = sumByCategory(entries, 'expense');

  const totalInc = Object.values(incMap).reduce((s,v)=>s+v,0);
  const totalExp = Object.values(expMap).reduce((s,v)=>s+v,0);
  document.getElementById('realIncTotal').textContent = fmt(totalInc);
  document.getElementById('realExpTotal').textContent = fmt(totalExp);

  // Income list
  const incCats = state.categories.filter(c=>c.type==='income');
  const incEl = document.getElementById('realIncList');
  const incRows = incCats.filter(c=>incMap[c.id]>0);
  incEl.innerHTML = incRows.length===0
    ? '<div style="color:var(--muted);font-size:12px;">本月尚無收入紀錄</div>'
    : incRows.map(c=>{
        const v = incMap[c.id]||0;
        const pct = totalInc>0?((v/totalInc)*100).toFixed(1):0;
        return `<div class="expense-item">
          <div class="expense-row">
            <span style="display:flex;align-items:center;gap:6px;font-size:13px;">
              <span style="width:8px;height:8px;border-radius:50%;background:${c.color};display:inline-block;"></span>${c.name}
            </span>
            <span style="font-family:'Space Mono',monospace;font-size:12px;display:flex;align-items:center;gap:6px;">
              <span style="color:var(--muted);">${pct}%</span>
              <span class="green">${fmt(v)}</span>
            </span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c.color};"></div></div>
        </div>`;
      }).join('');

  // Expense list
  const expCats = state.categories.filter(c=>c.type==='expense');
  const expEl = document.getElementById('realExpList');
  const expRows = expCats.filter(c=>expMap[c.id]>0);
  expEl.innerHTML = expRows.length===0
    ? '<div style="color:var(--muted);font-size:12px;">本月尚無支出紀錄</div>'
    : expRows.map(c=>{
        const v = expMap[c.id]||0;
        const pct = totalExp>0?((v/totalExp)*100).toFixed(1):0;
        return `<div class="expense-item">
          <div class="expense-row">
            <span style="display:flex;align-items:center;gap:6px;font-size:13px;">
              <span style="width:8px;height:8px;border-radius:50%;background:${c.color};display:inline-block;"></span>${c.name}
            </span>
            <span style="font-family:'Space Mono',monospace;font-size:12px;display:flex;align-items:center;gap:6px;">
              <span style="color:var(--muted);">${pct}%</span>
              <span class="red">${fmt(v)}</span>
            </span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c.color};"></div></div>
        </div>`;
      }).join('');

  // Budget comparison
  const budgetEl = document.getElementById('budgetList');
  const budgetCats = expCats.filter(c=>c.budget>0);
  if(budgetCats.length===0){
    budgetEl.innerHTML = '<div style="color:var(--muted);font-size:12px;">請至「資產管理」設定各類別預算</div>';
  } else {
    budgetEl.innerHTML = budgetCats.map(c=>{
      const spent = expMap[c.id]||0;
      const pct = Math.min((spent/c.budget)*100, 100).toFixed(0);
      const over = spent > c.budget;
      return `<div class="expense-item">
        <div class="expense-row">
          <span style="display:flex;align-items:center;gap:6px;font-size:13px;">
            <span style="width:8px;height:8px;border-radius:50%;background:${c.color};display:inline-block;"></span>${c.name}
          </span>
          <span style="font-family:'Space Mono',monospace;font-size:12px;display:flex;align-items:center;gap:6px;">
            <span class="${over?'red':'muted'}" style="color:${over?'var(--red)':'var(--muted)'};">${fmt(spent)}</span>
            <span style="color:var(--muted);">/ ${fmt(c.budget)}</span>
            ${over?`<span style="color:var(--red);font-size:10px;">超支</span>`:''}
          </span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${over?'var(--red)':c.color};"></div>
        </div>
      </div>`;
    }).join('');
  }
}

let ethPriceTWD = null, ethLastUpdated = null;

function renderInvestments(){
  const el = document.getElementById('investList');
  el.innerHTML = state.investments.map((inv,i)=>{
    if(inv.type==='etf'){
      const gain = inv.shares*(inv.currentPrice-inv.costPrice);
      const gainPct = ((inv.currentPrice-inv.costPrice)/inv.costPrice*100).toFixed(2);
      const up = gain>=0;
      return `<div class="invest-card">
        <div class="invest-top">
          <div><div class="invest-name">${inv.name}</div><div class="invest-ticker">${inv.ticker}</div></div>
          <div style="display:flex;gap:6px;align-items:center;">
            <span class="invest-badge ${up?'badge-up':'badge-down'}">${up?'+':''}${gainPct}%</span>
            <button class="edit-btn" onclick="editInvestItem(${i})">編輯</button>
          </div>
        </div>
        <div class="invest-grid">
          <div><div class="invest-stat-l">持股</div><div class="invest-stat-v">${inv.shares} 股</div></div>
          <div><div class="invest-stat-l">現價</div><div class="invest-stat-v">${inv.currentPrice}</div></div>
          <div><div class="invest-stat-l">成本均價</div><div class="invest-stat-v">${inv.costPrice}</div></div>
          <div><div class="invest-stat-l">預估損益</div><div class="invest-stat-v ${up?'green':'red'}">${up?'+':''}${fmt(gain)}</div></div>
          <div><div class="invest-stat-l">損益兩平</div><div class="invest-stat-v">${inv.breakeven}</div></div>
          <div><div class="invest-stat-l">市值</div><div class="invest-stat-v green">${fmt(inv.shares*inv.currentPrice)}</div></div>
        </div>
      </div>`;
    } else {
      const gain = inv.currentTWD - inv.costTWD;
      const gainPct = ((gain/inv.costTWD)*100).toFixed(2);
      const up = gain>=0;
      const livePriceStr = inv.livePrice
        ? `<span style="color:var(--green);font-size:10px;">● 即時</span> $${inv.livePrice.toLocaleString()} TWD/ETH`
        : `${inv.avgPrice.toLocaleString()} TWD（手動）`;
      const updStr = ethLastUpdated ? ethLastUpdated.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) : '—';
      return `<div class="invest-card">
        <div class="invest-top">
          <div><div class="invest-name">${inv.name}</div><div class="invest-ticker">${inv.ticker}</div></div>
          <div style="display:flex;gap:6px;align-items:center;">
            <span class="invest-badge ${up?'badge-up':'badge-down'}">${up?'+':''}${gainPct}%</span>
            <button class="edit-btn" onclick="fetchETHPrice()" style="border-color:rgba(0,229,160,0.4);color:var(--green);">↻</button>
            <button class="edit-btn" onclick="editInvestItem(${i})">編輯</button>
          </div>
        </div>
        <div class="invest-grid">
          <div><div class="invest-stat-l">持倉</div><div class="invest-stat-v">${inv.amount} ETH</div></div>
          <div><div class="invest-stat-l">現值</div><div class="invest-stat-v green">${fmt(inv.currentTWD)}</div></div>
          <div style="grid-column:1/-1"><div class="invest-stat-l">即時單價</div><div class="invest-stat-v" style="font-size:12px;">${livePriceStr}</div></div>
          <div><div class="invest-stat-l">成交均價</div><div class="invest-stat-v">${inv.avgPrice.toLocaleString()} TWD</div></div>
          <div><div class="invest-stat-l">預估損益</div><div class="invest-stat-v ${up?'green':'red'}">${up?'+':''}${fmt(gain)}</div></div>
        </div>
        ${ethLastUpdated?`<div style="font-size:10px;color:var(--muted);margin-top:6px;text-align:right;">更新 ${updStr}</div>`:''}
      </div>`;
    }
  }).join('') + `<button class="add-btn" onclick="addInvestItem()">＋ 新增投資項目</button>`;
}

// ================================================================
// HISTORY TAB
// ================================================================
function renderHistory(){
  const el = document.getElementById('historyList');
  if(!state.history||state.history.length===0){
    el.innerHTML='<div style="color:var(--muted);font-size:12px;padding:10px;">尚無存檔紀錄</div>';
    return;
  }
  el.innerHTML = state.history.map((h,idx)=>{
    const expDetail = (h.expBreakdown||[]).filter(e=>e.value>0).map(e=>
      `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);">
        <span style="display:flex;align-items:center;gap:6px;font-size:12px;">
          <span style="width:7px;height:7px;border-radius:50%;background:${e.color||'#aaa'};display:inline-block;"></span>${e.name}
        </span>
        <span style="font-family:'Space Mono',monospace;font-size:12px;color:var(--red);">$${e.value.toLocaleString()}</span>
      </div>`).join('');
    const incDetail = (h.incBreakdown||[]).filter(i=>i.value>0).map(i=>
      `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:12px;">${i.name}</span>
        <span style="font-family:'Space Mono',monospace;font-size:12px;color:var(--green);">$${i.value.toLocaleString()}</span>
      </div>`).join('');
    return `<div class="hist-item">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div class="item-name" style="cursor:pointer;" onclick="document.getElementById('hd-${idx}').style.display=document.getElementById('hd-${idx}').style.display==='none'?'block':'none'">
            ${h.month} <span style="font-size:11px;color:var(--muted);">▾</span>
          </div>
          <div class="item-sub">收 $${h.income.toLocaleString()} ／ 支 $${h.expense.toLocaleString()}${h.netWorth?` ／ 淨資產 $${h.netWorth.toLocaleString()}`:''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="item-val ${h.net>=0?'green':'red'}">${h.net>=0?'+':''}$${h.net.toLocaleString()}</div>
          <button class="edit-btn" style="color:var(--red);border-color:rgba(255,77,109,0.3);" onclick="deleteHistory(${idx})">刪除</button>
        </div>
      </div>
      <div id="hd-${idx}" class="hist-detail">
        ${incDetail?`<div style="font-size:11px;color:var(--green);margin-bottom:6px;">收入明細</div>${incDetail}`:''}
        ${expDetail?`<div style="font-size:11px;color:var(--red);margin-top:10px;margin-bottom:6px;">支出明細</div>${expDetail}`:''}
        ${!incDetail&&!expDetail?'<div style="font-size:12px;color:var(--muted);">無明細資料</div>':''}
      </div>
    </div>`;
  }).join('');
}

function deleteHistory(idx){
  if(!confirm('確定刪除這筆歷史紀錄？')) return;
  state.history.splice(idx,1);
  saveState(); renderHistory();
}

// ================================================================
// ARCHIVE MONTH
// ================================================================
function archiveMonth(){
  const mk = getCurrentMonthKey();
  const entries = getMonthJournal(mk);
  const totalInc = entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const totalExp = entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const net = totalInc - totalExp;
  const acctTotal = state.accounts.reduce((s,a)=>s+a.value,0);
  const investTWD = state.investments.reduce((s,i)=>{
    if(i.type==='etf') return s+i.shares*i.currentPrice;
    return s+i.currentTWD;
  },0);
  const netWorth = acctTotal + investTWD;

  const now = new Date();
  const defaultYear = now.getDate()<=5?(now.getMonth()===0?now.getFullYear()-1:now.getFullYear()):now.getFullYear();
  const defaultMonth = now.getDate()<=5?(now.getMonth()===0?12:now.getMonth()):now.getMonth()+1;

  const fields = `
    <div style="background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:14px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">本月摘要</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div><div style="font-size:11px;color:var(--muted);">交易筆數</div><div style="font-family:'Space Mono',monospace;font-size:15px;">${entries.length} 筆</div></div>
        <div><div style="font-size:11px;color:var(--muted);">結餘</div><div style="font-family:'Space Mono',monospace;font-size:15px;color:${net>=0?'var(--green)':'var(--red)'};">${net>=0?'+':''}$${net.toLocaleString()}</div></div>
        <div><div style="font-size:11px;color:var(--muted);">實際收入</div><div style="font-family:'Space Mono',monospace;font-size:15px;color:var(--green);">$${totalInc.toLocaleString()}</div></div>
        <div><div style="font-size:11px;color:var(--muted);">實際支出</div><div style="font-family:'Space Mono',monospace;font-size:15px;color:var(--red);">$${totalExp.toLocaleString()}</div></div>
        <div style="grid-column:1/-1"><div style="font-size:11px;color:var(--muted);">當前淨資產</div><div style="font-family:'Space Mono',monospace;font-size:15px;">$${netWorth.toLocaleString()}</div></div>
      </div>
    </div>
    <div class="form-group">
      <label>結算月份（格式：2026/03）</label>
      <input type="text" id="f_archiveMonth" value="${defaultYear}/${String(defaultMonth).padStart(2,'0')}">
    </div>
    <div style="font-size:11px;color:var(--muted);">⚠️ 結算後，該月份交易紀錄會保留但封存，不影響帳戶餘額。</div>`;

  currentEditType = 'archive';
  openModal('📦 月底結算', fields, '確認結算');
}

function confirmArchive(){
  const rawMonth = (document.getElementById('f_archiveMonth')?.value||'').trim();
  if(!rawMonth.match(/^\d{4}\/\d{2}$/)){alert('格式錯誤，請輸入如 2026/03');return;}
  const [y,m] = rawMonth.split('/');
  const monthKey = `${y} 年 ${parseInt(m)} 月`;
  const mk = `${y}-${m}`;
  const entries = getMonthJournal(mk);

  const totalInc = entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const totalExp = entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const acctTotal = state.accounts.reduce((s,a)=>s+a.value,0);
  const investTWD = state.investments.reduce((s,i)=>{
    if(i.type==='etf') return s+i.shares*i.currentPrice;
    return s+i.currentTWD;
  },0);

  // 按類別彙整
  const incMap = sumByCategory(entries,'income');
  const expMap = sumByCategory(entries,'expense');

  if(!state.history) state.history=[];
  state.history.unshift({
    month: monthKey,
    income: totalInc,
    expense: totalExp,
    net: totalInc - totalExp,
    netWorth: acctTotal + investTWD,
    incBreakdown: state.categories.filter(c=>c.type==='income'&&incMap[c.id]>0).map(c=>({name:c.name,value:incMap[c.id]||0})),
    expBreakdown: state.categories.filter(c=>c.type==='expense'&&expMap[c.id]>0).map(c=>({name:c.name,value:expMap[c.id]||0,color:c.color})),
  });

  saveState();
  closeModal();
  renderAll();
  showToast(`${monthKey} 結算完成 ✓`);
}

// ================================================================
// MODAL ENGINE
// ================================================================
function openModal(title, fields, confirmLabel){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalFields').innerHTML = fields;
  document.getElementById('modalConfirmBtn').textContent = confirmLabel||'儲存';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  currentEditType = null; currentEditIndex = null;
}
function val(id){ return document.getElementById(id)?.value||''; }
function numval(id){ return parseFloat(val(id))||0; }
function field(label,id,value,type='text'){
  return `<div class="form-group"><label>${label}</label><input type="${type}" id="${id}" value="${escHtml(String(value))}"></div>`;
}
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function saveModal(){
  if(currentEditType==='transfer_new'){ saveTransferEntry(); return; }
  if(currentEditType==='archive'){ confirmArchive(); return; }
  if(currentEditType==='journal_new'||currentEditType==='journal_edit'){ saveJournalEntry(); return; }
  if(currentEditType==='account_edit'){
    const a = state.accounts[currentEditIndex];
    a.name=val('f_name'); a.sub=val('f_sub'); a.value=numval('f_value');
    saveState(); closeModal(); renderAccounts(); renderHero(); return;
  }
  if(currentEditType==='account_new'){
    state.accounts.push({id:uid(),name:val('f_name'),sub:val('f_sub'),value:numval('f_value')});
    saveState(); closeModal(); renderAccounts(); renderHero(); return;
  }
  if(currentEditType==='cat_edit'){
    const c = state.categories[currentEditIndex];
    c.name=val('f_name'); c.budget=numval('f_budget');
    saveState(); closeModal(); renderBudgetSettings(); renderSummary(); return;
  }
  if(currentEditType==='cat_new'){
    state.categories.push({id:uid(),name:val('f_name'),color:randomColor(),budget:numval('f_budget'),type:val('f_cattype')||'expense'});
    saveState(); closeModal(); renderBudgetSettings(); return;
  }
  if(currentEditType==='invest_etf'){
    const inv=state.investments[currentEditIndex];
    inv.name=val('f_name');inv.ticker=val('f_ticker');inv.shares=numval('f_shares');
    inv.costPrice=numval('f_cost');inv.currentPrice=numval('f_price');inv.breakeven=numval('f_breakeven');
    saveState(); closeModal(); renderInvestments(); renderHero(); return;
  }
  if(currentEditType==='invest_crypto'){
    const inv=state.investments[currentEditIndex];
    inv.name=val('f_name');inv.ticker=val('f_ticker');inv.amount=parseFloat(val('f_amount'))||0;
    inv.costTWD=numval('f_cost');inv.currentTWD=numval('f_current');inv.avgPrice=numval('f_avg');
    saveState(); closeModal(); renderInvestments(); renderHero(); return;
  }
  if(currentEditType==='invest_new_etf'){
    state.investments.push({name:val('f_name'),ticker:val('f_ticker'),type:'etf',shares:numval('f_shares'),costPrice:numval('f_cost'),currentPrice:numval('f_price'),breakeven:numval('f_breakeven')});
    saveState(); closeModal(); renderInvestments(); renderHero(); return;
  }
  if(currentEditType==='invest_new_crypto'){
    state.investments.push({name:val('f_name'),ticker:val('f_ticker'),type:'crypto',amount:parseFloat(val('f_amount'))||0,costTWD:numval('f_cost'),currentTWD:numval('f_current'),avgPrice:numval('f_avg')});
    saveState(); closeModal(); renderInvestments(); renderHero(); return;
  }
}

// ================================================================
// ETH LIVE PRICE
// ================================================================
async function fetchETHPrice(){
  const btn = document.getElementById('ethRefreshBtn');
  if(btn){ btn.textContent='⟳ 更新中'; btn.disabled=true; }
  try{
    const res = await fetch('https://api.bitopro.com/v3/tickers/eth_twd');
    const data = await res.json();
    ethPriceTWD = Math.round(parseFloat(data.data.lastPrice));
    ethLastUpdated = new Date();
    state.investments.forEach(inv=>{
      if(inv.type==='crypto'&&inv.ticker==='ETH'){
        inv.currentTWD = Math.round(inv.amount * ethPriceTWD);
        inv.livePrice = ethPriceTWD;
      }
    });
    renderInvestments(); renderHero();
    showToast(`ETH ${ethPriceTWD.toLocaleString()} TWD ↻`);
  }catch(e){
    console.warn('ETH 價格抓取失敗',e);
    showToast('ETH 價格抓取失敗');
  } finally {
    if(btn){ btn.textContent='↻ ETH'; btn.disabled=false; }
  }
}

// ================================================================
// EXPORT / IMPORT
// ================================================================
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `finance_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importData(){
  const input = document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange = e=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const p = JSON.parse(ev.target.result);
        // v2 format
        if(p.categories){
          if(p.accounts) state.accounts=p.accounts;
          if(p.investments) state.investments=p.investments;
          if(p.categories) state.categories=p.categories;
          if(p.journal) state.journal=p.journal;
          if(p.history) state.history=p.history;
          saveState(); renderAll(); showToast('匯入成功 ✓');
        } else {
          // v1 legacy format — migrate accounts & investments only
          if(p.accounts) state.accounts = p.accounts.map(a=>({...a, id: a.id||uid()}));
          if(p.investments) state.investments = p.investments;
          if(p.history) state.history = p.history;
          saveState(); renderAll();
          showToast('舊版資料已匯入（帳戶＋投資）✓');
        }
      }catch(e){ alert('JSON 格式錯誤'); }
    };
    reader.readAsText(file);
  };
  input.click();
}
